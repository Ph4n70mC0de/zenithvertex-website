name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
      placeholder: I'm frustrated when ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like
      placeholder: It would be great if ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other solutions or workarounds you've considered
      placeholder: I also considered ...
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references
      placeholder: Links, screenshots, or related issues
    validations:
      required: false
  - type: checkboxes
    id: contributing
    attributes:
      label: Contributing
      description: Would you like to work on this?
      options:
        - label: I'd like to implement this feature myself
          required: false
