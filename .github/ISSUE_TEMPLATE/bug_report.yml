name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the bug
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Expected behavior
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots if applicable
      placeholder: Paste or drag screenshots here
    validations:
      required: false
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did you encounter this bug?
      options:
        - Production (zenithvertex.org)
        - Staging / Preview deployment
        - Local development
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser (if applicable)
      description: Browser name and version
      placeholder: |
        - OS: [e.g. Windows 11, macOS 15]
        - Browser: [e.g. Chrome 126, Firefox 128]
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, logs, or related issues
      placeholder: Any additional information
    validations:
      required: false
